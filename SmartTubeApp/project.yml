name: SmartTubeApp

options:
  bundleIdPrefix: com.void.smarttube
  xcodeVersion: "16.0"

packages:
  SmartTubeIOS:
    path: ../SmartTubeIOS

targets:
  SmartTube:
    type: application
    supportedDestinations:
      - iOS
      - iPad
      - macOS
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources
      - path: SmartTubeApp/Assets.xcassets
      - path: SmartTubeApp/Launch Screen.storyboard
    info:
      path: SmartTubeApp/Info.plist
      properties:
        CFBundleDisplayName: SmartTube
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.entertainment
        UILaunchStoryboardName: Launch Screen
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.void.smarttube.oauth
            CFBundleURLSchemes:
              - smarttube
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSHumanReadableCopyright: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.void.smarttube.app
        PRODUCT_NAME: SmartTube
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LAUNCH_STORYBOARD_NAME: "Launch Screen.storyboard"
    dependencies:
      - package: SmartTubeIOS
        product: SmartTubeIOS

  SmartTubeUITests:
    type: bundle.ui-testing
    supportedDestinations:
      - iOS
      - iPad
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: UITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.void.smarttube.app.uitests
        TEST_TARGET_NAME: SmartTube
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: SmartTube


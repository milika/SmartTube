name: SmartTubeApp

options:
  bundleIdPrefix: com.smarttube
  xcodeVersion: "16.0"

packages:
  SmartTubeIOS:
    path: ../SmartTubeIOS

targets:
  SmartTube:
    type: application
    supportedDestinations:
      - iOS
      - iPad
      - macOS
    deploymentTarget:
      iOS: "17.0"
      iPadOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources
      - path: SmartTubeApp/Assets.xcassets
    info:
      path: SmartTubeApp/Info.plist
      properties:
        CFBundleDisplayName: SmartTube
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.smarttube.oauth
            CFBundleURLSchemes:
              - smarttube
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSHumanReadableCopyright: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.void.smarttube.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SmartTubeIOS
        product: SmartTubeIOS

  SmartTubeUITests:
    type: bundle.ui-testing
    supportedDestinations:
      - iOS
      - iPad
    deploymentTarget:
      iOS: "17.0"
      iPadOS: "17.0"
    sources:
      - path: UITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.void.smarttube.app.uitests
        TEST_TARGET_NAME: SmartTube
    dependencies:
      - target: SmartTube

